<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel DP — Pró Eficácia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0E1B3D;--navy2:#1a2d5a;--gold:#B8975A;--gold2:#D4B483;--goldpale:#F5EDD8;
  --off:#F7F6F3;--border:#E2DDD4;--text:#1C1C1C;--muted:#6B6560;--red:#C0392B;
}
body{background:var(--off);font-family:'Inter',sans-serif;color:var(--text);font-size:15px}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.lcard{background:#fff;border-radius:14px;border:1px solid var(--border);width:100%;max-width:380px;overflow:hidden}
.ltop{background:var(--navy);padding:30px 28px 24px;text-align:center}
.ltop img{height:46px;margin-bottom:14px}
.ltop h1{font-size:15px;font-weight:500;color:#fff}
.ltop p{font-size:12px;color:var(--gold2);margin-top:3px}
.gold-line{height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.lbody{padding:26px 28px 30px}
.lf{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.lf label{font-size:12px;font-weight:500;color:var(--muted)}
.lf input{height:42px;padding:0 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--off);font-size:14px;font-family:'Inter',sans-serif;color:var(--text)}
.lf input:focus{outline:none;border-color:var(--gold);background:#fff}
.lbtn{width:100%;height:44px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px}
.lbtn:hover{background:var(--navy2)}
.lerr{font-size:13px;color:var(--red);margin-top:8px;text-align:center;display:none}
#app{display:none;min-height:100vh}
.app-hd{background:var(--navy);position:sticky;top:0;z-index:100}
.app-hd-in{max-width:1080px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between}
.app-hd img{height:34px}
.app-hd-r{display:flex;align-items:center;gap:14px}
.app-hd-r span{font-size:13px;color:rgba(255,255,255,.55)}
.out-btn{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:13px;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif}
.out-btn:hover{background:rgba(255,255,255,.2)}
.app-wrap{max-width:1080px;margin:0 auto;padding:26px 24px 64px}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:13px;margin-bottom:24px}
@media(max-width:680px){.stats{grid-template-columns:1fr 1fr}}
.sc{background:#fff;border:1px solid var(--border);border-radius:10px;padding:15px 18px}
.sc.gold{border-top:3px solid var(--gold)}
.sc .n{font-size:28px;font-weight:600;color:var(--navy)}
.sc .l{font-size:12px;color:var(--muted);margin-top:2px}
.lg{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:18px}
.lg-tit{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--navy);margin-bottom:13px}
.lg-row{display:flex;gap:10px;align-items:flex-end}
.lg-f{flex:1;display:flex;flex-direction:column;gap:4px}
.lg-f label{font-size:12px;color:var(--muted);font-weight:500}
.lg-f input{height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:7px;background:var(--off);font-size:14px;font-family:'Inter',sans-serif;color:var(--text)}
.lg-f input:focus{outline:none;border-color:var(--gold);background:#fff}
.lg-btn{height:40px;padding:0 20px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.lg-btn:hover{background:var(--navy2)}
.lg-result{display:none;margin-top:12px;background:var(--off);border:1px solid var(--border);border-radius:7px;padding:11px 14px;align-items:center;gap:10px}
.lg-result.show{display:flex}
.lg-url{flex:1;font-size:13px;color:var(--navy);word-break:break-all}
.cp-btn{padding:6px 14px;background:var(--goldpale);border:1px solid var(--gold);color:var(--navy);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif}
.cp-btn:hover{background:var(--gold);color:#fff}
.tw{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tt{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.tt h3{font-size:14px;font-weight:600;color:var(--navy)}
.srch{height:36px;padding:0 12px;border:1.5px solid var(--border);border-radius:7px;background:var(--off);font-size:13px;font-family:'Inter',sans-serif;color:var(--text);width:210px}
.srch:focus{outline:none;border-color:var(--gold)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--off);padding:10px 16px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--off)}
tbody td{padding:11px 16px;font-size:13px}
tbody td.m{color:var(--muted)}
.bs{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-novo{background:#E8F5E9;color:#2E7D32}
.b-aguard{background:#FFF3E0;color:#E65100}
.b-and{background:#FFF8E1;color:#F57F17}
.b-conc{background:#E3F2FD;color:#1565C0}
.empty{text-align:center;padding:48px;color:var(--muted);font-size:14px}
.ov{display:none;position:fixed;inset:0;background:rgba(14,27,61,.6);z-index:200;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.mhd{background:var(--navy);padding:16px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0}
.mhd h2{font-size:14px;font-weight:600;color:#fff}
.mcl{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mcl:hover{background:rgba(255,255,255,.25)}
.mbody{padding:22px}
.ms{margin-bottom:18px}
.ms-tit{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:7px 18px}
.mf .ml{font-size:11px;color:var(--muted);margin-bottom:2px}
.mf .mv{font-size:14px;color:var(--text);font-weight:500}
.st-sel{height:34px;padding:0 10px;border:1.5px solid var(--border);border-radius:6px;background:var(--off);font-size:13px;font-family:'Inter',sans-serif;color:var(--text)}
.st-sel:focus{outline:none;border-color:var(--gold)}
.mact{display:flex;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.msave{flex:1;height:40px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif}
.msave:hover{background:var(--navy2)}
.mclose{height:40px;padding:0 16px;background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:7px;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif}
.mclose:hover{background:var(--off)}
.doc-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.doc-item{display:flex;align-items:center;gap:8px;background:var(--off);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:13px}
.doc-item a{flex:1;color:var(--navy);font-weight:500;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-item a:hover{text-decoration:underline}
.doc-empty{font-size:13px;color:var(--muted);font-style:italic}
</style>
</head>
<body>
<div id="login">
  <div class="lcard">
    <div class="ltop">
      <img src="logo.png" alt="Pró Eficácia">
      <h1>Painel — Departamento Pessoal</h1>
      <p>Acesso restrito à equipe</p>
    </div>
    <div class="gold-line"></div>
    <div class="lbody">
      <div class="lf"><label>E-mail</label><input type="email" id="lemail" placeholder="seu@email.com.br"></div>
      <div class="lf"><label>Senha</label><input type="password" id="lsenha" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="lbtn" onclick="login()">Entrar</button>
      <div class="lerr" id="lerr">E-mail ou senha incorretos.</div>
    </div>
  </div>
</div>

<div id="app">
  <div class="app-hd">
    <div class="app-hd-in">
      <img src="logo.png" alt="Pró Eficácia">
      <div class="app-hd-r">
        <span id="uEmail"></span>
        <button class="out-btn" onclick="logout()">Sair</button>
      </div>
    </div>
    <div class="gold-line"></div>
  </div>
  <div class="app-wrap">
    <div class="stats">
      <div class="sc gold"><div class="n" id="sTot">—</div><div class="l">Total de fichas</div></div>
      <div class="sc"><div class="n" id="sNov">—</div><div class="l">Novas</div></div>
      <div class="sc"><div class="n" id="sAguard">—</div><div class="l">Aguard. empresa</div></div>
      <div class="sc"><div class="n" id="sAnd">—</div><div class="l">Em andamento</div></div>
      <div class="sc"><div class="n" id="sCon">—</div><div class="l">Concluídas</div></div>
    </div>
    <div class="lg">
      <div class="lg-tit">Gerar link de admissão</div>
      <div class="lg-row">
        <div class="lg-f"><label>Nome da empresa</label><input type="text" id="lgEmp" placeholder="Ex: Padaria São João"></div>
        <button class="lg-btn" onclick="gerarLink()">Gerar link</button>
      </div>
      <div class="lg-result" id="lgResult">
        <span class="lg-url" id="lgUrl"></span>
        <button class="cp-btn" onclick="copiar()">Copiar</button>
      </div>
    </div>
    <div class="tw">
      <div class="tt">
        <h3>Fichas recebidas</h3>
        <input type="text" class="srch" id="srch" placeholder="Buscar nome ou empresa..." oninput="render()">
      </div>
      <div id="tbl"><div class="empty">Carregando...</div></div>
    </div>
  </div>
</div>

<div class="ov" id="ov" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mhd"><h2 id="mTit">Ficha admissional</h2><button class="mcl" onclick="closeModal()">×</button></div>
    <div class="gold-line"></div>
    <div class="mbody" id="mBody"></div>
  </div>
</div>

<script>
const SB_URL='https://rgelyzzuexghmhpualhm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnZWx5enp1ZXhnaG1ocHVhbGhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTU4MDgsImV4cCI6MjA5Njc3MTgwOH0.vutgtaQ12L4-8GQgdCwdrJjOlG9a0KbSgGnEntXL8eM';
const FORM_URL=window.location.origin+'/form.html';
let token=null, fichas=[], atual=null;

async function login(){
  const email=document.getElementById('lemail').value.trim();
  const senha=document.getElementById('lsenha').value;
  document.getElementById('lerr').style.display='none';
  try{
    const r=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({email,password:senha})
    });
    const d=await r.json();
    if(!r.ok||!d.access_token)throw new Error();
    token=d.access_token;
    document.getElementById('uEmail').textContent=email;
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    carregar();
  }catch(e){document.getElementById('lerr').style.display='block';}
}

function logout(){
  token=null;fichas=[];
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
}

async function carregar(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/fichas_admissionais?select=*&order=created_at.desc',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token}
    });
    fichas=await r.json();
    stats();render();
  }catch(e){document.getElementById('tbl').innerHTML='<div class="empty">Erro ao carregar fichas.</div>';}
}

function stats(){
  document.getElementById('sTot').textContent=fichas.length;
  document.getElementById('sNov').textContent=fichas.filter(f=>f.status==='novo').length;
  document.getElementById('sAguard').textContent=fichas.filter(f=>f.status==='aguardando_empresa').length;
  document.getElementById('sAnd').textContent=fichas.filter(f=>f.status==='andamento').length;
  document.getElementById('sCon').textContent=fichas.filter(f=>f.status==='concluido').length;
}

function render(){
  const q=document.getElementById('srch').value.toLowerCase();
  const list=fichas.filter(f=>(f.nome||'').toLowerCase().includes(q)||(f.empresa||'').toLowerCase().includes(q));
  if(!list.length){document.getElementById('tbl').innerHTML='<div class="empty">Nenhuma ficha encontrada.</div>';return;}
  const sl={novo:'Novo',aguardando_empresa:'Aguard. empresa',andamento:'Em andamento',concluido:'Concluído'};
  const sc={novo:'b-novo',aguardando_empresa:'b-aguard',andamento:'b-and',concluido:'b-conc'};
  let h=`<table><thead><tr><th>Nome</th><th>Empresa</th><th>Função</th><th>Admissão</th><th>Status</th></tr></thead><tbody>`;
  list.forEach(f=>{
    const dt=f.admissao?new Date(f.admissao+'T12:00:00').toLocaleDateString('pt-BR'):'—';
    const st=f.status||'novo';
    h+=`<tr onclick="openModal(${f.id})">
      <td><strong>${f.nome||'—'}</strong></td>
      <td class="m">${f.empresa||'—'}</td>
      <td class="m">${f.funcao||'—'}</td>
      <td class="m">${dt}</td>
      <td><span class="bs ${sc[st]||'b-novo'}">${sl[st]||st}</span></td>
    </tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('tbl').innerHTML=h;
}

function gerarLink(){
  const emp=document.getElementById('lgEmp').value.trim();
  if(!emp){document.getElementById('lgEmp').focus();return;}
  document.getElementById('lgUrl').textContent=FORM_URL+'?empresa='+encodeURIComponent(emp);
  document.getElementById('lgResult').classList.add('show');
}

function copiar(){
  navigator.clipboard.writeText(document.getElementById('lgUrl').textContent).then(()=>{
    const b=document.querySelector('.cp-btn');b.textContent='Copiado!';
    setTimeout(()=>b.textContent='Copiar',2000);
  });
}

function formatarHorarios(f){
  const raw=(f.horario_seg_sex||'').trim();
  if(!raw)return'Não informado';
  const partes=raw.split(' | ');
  if(partes.length===0)return'Não informado';
  // Agrupa dias com mesmo horário
  const dias=['Seg','Ter','Qua','Qui','Sex'];
  if(partes.length===1){
    return`Seg–Sex: ${partes[0]}`;
  }
  // Verifica se todos iguais
  const uniq=[...new Set(partes)];
  if(uniq.length===1)return`Seg–Sex: ${uniq[0]}`;
  // Monta linha por linha agrupando consecutivos
  let result=[], i=0;
  while(i<partes.length){
    let j=i;
    while(j<partes.length-1&&partes[j]===partes[j+1])j++;
    if(i===j) result.push(`${dias[i]}: ${partes[i]}`);
    else result.push(`${dias[i]}–${dias[j]}: ${partes[i]}`);
    i=j+1;
  }
  return result.join('<br>');
}

async function listarDocumentos(fichaId){
  try{
    const r=await fetch(`${SB_URL}/storage/v1/object/list/documentos-admissao`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({prefix:`fichas/${fichaId}/`,limit:50})
    });
    if(!r.ok)return[];
    const data=await r.json();
    return data||[];
  }catch(e){return[];}
}

async function openModal(id){
  const f=fichas.find(x=>x.id===id);
  if(!f)return;
  atual=f;
  document.getElementById('mTit').textContent=f.nome||'Ficha admissional';

  let filhos;
  try{filhos=JSON.parse(f.filhos||'[]');}catch(e){filhos=[];}
  const fh=filhos.length?filhos.map(c=>`<div style="font-size:13px;padding:6px 0;border-bottom:1px solid var(--border)">${c.nome||'—'} | Nasc: ${c.nasc||'—'} | CPF: ${c.cpf||'—'}</div>`).join(''):'<span style="color:var(--muted);font-size:13px">Nenhum</span>';
  const dt=f.admissao?new Date(f.admissao+'T12:00:00').toLocaleDateString('pt-BR'):'—';

  document.getElementById('mBody').innerHTML=`
    <div class="ms"><div class="ms-tit">Empresa & admissão</div><div class="mg">
      <div class="mf"><div class="ml">Empresa</div><div class="mv">${f.empresa||'—'}</div></div>
      <div class="mf"><div class="ml">Admissão</div><div class="mv">${dt}</div></div>
      <div class="mf"><div class="ml">Função</div><div class="mv">${f.funcao||'—'}</div></div>
      <div class="mf"><div class="ml">Salário</div><div class="mv">R$ ${f.salario||'—'}</div></div>
      <div class="mf"><div class="ml">Contrato</div><div class="mv">${f.contrato||'—'}</div></div>
      <div class="mf"><div class="ml">Vale transporte</div><div class="mv">${f.vale_transporte||'—'}</div></div>
      <div class="mf" style="grid-column:span 2"><div class="ml">Horário Seg–Sex</div><div class="mv" style="font-size:13px">${formatarHorarios(f)}</div></div>
      <div class="mf" style="grid-column:span 2"><div class="ml">Horário Sábado</div><div class="mv">${f.horario_sabado||'Não informado'}</div></div>
    </div></div>
    <div class="ms"><div class="ms-tit">Dados pessoais</div><div class="mg">
      <div class="mf" style="grid-column:span 2"><div class="ml">Nome completo</div><div class="mv">${f.nome||'—'}</div></div>
      <div class="mf"><div class="ml">CPF</div><div class="mv">${f.cpf||'—'}</div></div>
      <div class="mf"><div class="ml">PIS / PASEP</div><div class="mv">${f.pis||'—'}</div></div>
      <div class="mf"><div class="ml">Nome da mãe</div><div class="mv">${f.nome_mae||'—'}</div></div>
      <div class="mf"><div class="ml">Nome do pai</div><div class="mv">${f.nome_pai||'—'}</div></div>
      <div class="mf"><div class="ml">Cidade natal</div><div class="mv">${f.cidade_natal||'—'}</div></div>
      <div class="mf"><div class="ml">Estado civil</div><div class="mv">${f.estado_civil||'—'}</div></div>
      <div class="mf"><div class="ml">Raça / Cor</div><div class="mv">${f.raca_cor||'—'}</div></div>
    </div></div>
    <div class="ms"><div class="ms-tit">Endereço</div><div class="mg">
      <div class="mf"><div class="ml">CEP</div><div class="mv">${f.cep||'—'}</div></div>
      <div class="mf"><div class="ml">Rua</div><div class="mv">${f.rua||'—'}</div></div>
      <div class="mf"><div class="ml">Número</div><div class="mv">${f.numero||'—'}</div></div>
      <div class="mf"><div class="ml">Bairro</div><div class="mv">${f.bairro||'—'}</div></div>
      <div class="mf"><div class="ml">Complemento</div><div class="mv">${f.complemento||'—'}</div></div>
      <div class="mf" style="grid-column:span 2"><div class="ml">Cidade / UF</div><div class="mv">${f.cidade||'—'}</div></div>
    </div></div>
    <div class="ms"><div class="ms-tit">Filhos</div>${fh}</div>
    <div class="ms"><div class="ms-tit">Documentos</div><div class="doc-list" id="docList"><span class="doc-empty">Carregando...</span></div></div>
    <div class="mact">
      <div style="display:flex;align-items:center;gap:8px;flex:1">
        <span style="font-size:12px;color:var(--muted)">Status:</span>
        <select class="st-sel" id="mStatus">
          <option value="novo" ${(f.status||'novo')==='novo'?'selected':''}>Novo</option>
          <option value="aguardando_empresa" ${f.status==='aguardando_empresa'?'selected':''}>Aguard. empresa</option>
          <option value="andamento" ${f.status==='andamento'?'selected':''}>Em andamento</option>
          <option value="concluido" ${f.status==='concluido'?'selected':''}>Concluído</option>
        </select>
      </div>
      <button class="mclose" onclick="closeModal()">Fechar</button>
      <button class="msave" onclick="salvar()">Salvar status</button>
    </div>`;

  document.getElementById('ov').classList.add('open');

  // Carrega documentos em background
  listarDocumentos(f.id).then(docs=>{
    const el=document.getElementById('docList');
    if(!el)return;
    if(!docs.length){el.innerHTML='<span class="doc-empty">Nenhum documento enviado</span>';return;}
    el.innerHTML=docs.map(d=>{
      const url=`${SB_URL}/storage/v1/object/documentos-admissao/fichas/${f.id}/${d.name}`;
      return`<div class="doc-item"><span>📄</span><a href="${url}" target="_blank">${d.name}</a></div>`;
    }).join('');
  });
}

function closeModal(){document.getElementById('ov').classList.remove('open');atual=null;}

async function salvar(){
  if(!atual)return;
  const status=document.getElementById('mStatus').value;
  try{
    await fetch(SB_URL+'/rest/v1/fichas_admissionais?id=eq.'+atual.id,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+token,'Prefer':'return=minimal'},
      body:JSON.stringify({status})
    });
    const i=fichas.findIndex(f=>f.id===atual.id);
    if(i!==-1)fichas[i].status=status;
    stats();render();closeModal();
  }catch(e){alert('Erro ao salvar status.');}
}
</script>
</body>
</html>
