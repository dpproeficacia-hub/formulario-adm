<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha Admissional — Pró Eficácia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0E1B3D;--navy2:#1a2d5a;--gold:#B8975A;--gold2:#D4B483;--goldpale:#F5EDD8;
  --off:#F7F6F3;--border:#E2DDD4;--text:#1C1C1C;--muted:#6B6560;--red:#C0392B;--green:#1a7a4a;
}
body{background:var(--off);font-family:'Inter',sans-serif;color:var(--text);font-size:15px}
.hd{background:var(--navy)}
.hd-inner{max-width:760px;margin:0 auto;padding:24px;display:flex;align-items:center;justify-content:space-between}
.hd img{height:48px}
.hd-right{text-align:right}
.hd-right .sub{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold2)}
.hd-right .tit{font-size:16px;font-weight:600;color:#fff;margin-top:2px}
.gold-line{height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.emp-bar{background:var(--navy2);display:none}
.emp-bar-in{max-width:760px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:10px}
.emp-bar .tag{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600}
.emp-bar .nome{font-size:14px;font-weight:500;color:#fff}
.wrap{max-width:760px;margin:0 auto;padding:28px 24px 64px}
.card{background:#fff;border-radius:10px;border:1px solid var(--border);margin-bottom:18px;overflow:hidden}
.card-hd{background:var(--navy);padding:13px 20px;display:flex;align-items:center;justify-content:space-between}
.card-hd h2{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#fff}
.card-hd .badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(184,151,90,.2);color:var(--gold2)}
.card-body{padding:20px}
.g{display:grid;gap:13px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.s2{grid-column:span 2}
@media(max-width:540px){.g2,.g3{grid-template-columns:1fr}.s2{grid-column:span 1}}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:12px;font-weight:500;color:var(--muted)}
.f label .r{color:var(--gold)}
.f label .o{color:#bbb;font-weight:400;font-size:11px}
.f input,.f select{height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:7px;background:var(--off);color:var(--text);font-size:14px;font-family:'Inter',sans-serif;transition:border .15s}
.f input:focus,.f select:focus{outline:none;border-color:var(--gold);background:#fff}
.f input::placeholder{color:#ccc}
.rr{display:flex;gap:16px;height:40px;align-items:center}
.rr label{display:flex;align-items:center;gap:7px;font-size:14px;cursor:pointer}
.rr input[type=radio]{width:16px;height:16px;accent-color:var(--navy)}
.dv{height:1px;background:var(--border);margin:16px 0}
.sub{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sub::after{content:'';flex:1;height:1px;background:var(--border)}
.hor-table{width:100%;border-collapse:collapse;margin-bottom:12px}
.hor-table th{background:var(--navy);color:#fff;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:9px 10px;text-align:left}
.hor-table th:first-child{border-radius:7px 0 0 0}
.hor-table th:last-child{border-radius:0 7px 0 0;text-align:center}
.hor-table td{padding:6px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.hor-table tr:last-child td{border-bottom:none}
.hor-table tr:hover td{background:var(--off)}
.hor-table .day-label{font-size:13px;font-weight:500;color:var(--navy);padding-left:10px;white-space:nowrap;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hor-table .opt-tag{font-size:10px;color:#bbb;font-weight:400}
.hor-table input[type=time]{height:34px;padding:0 8px;border:1.5px solid var(--border);border-radius:6px;background:var(--off);color:var(--text);font-size:13px;font-family:'Inter',sans-serif;width:100%;min-width:90px}
.hor-table input[type=time]:focus{outline:none;border-color:var(--gold);background:#fff}
.hor-table .day-total{font-size:12px;font-weight:600;color:var(--navy);text-align:center;min-width:48px}
.copy-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;color:var(--navy);background:var(--goldpale);border:1px solid var(--gold);border-radius:5px;padding:4px 9px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.copy-btn:hover{background:var(--gold);color:#fff}
.total-horas{background:var(--off);border:1.5px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.total-horas .label{font-size:13px;color:var(--muted)}
.total-horas .valor{font-size:18px;font-weight:600;color:var(--navy)}
.total-horas.ok .valor{color:var(--green)}
.total-horas.warn{background:#FFF3CD;border-color:#F0AD4E}
.total-horas.warn .valor{color:#856404}
.aviso{font-size:12px;color:#856404;margin-top:2px}
.filhos-area{background:var(--off);border:1.5px dashed var(--border);border-radius:8px;padding:14px;margin-top:8px}
.filho-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:13px 14px;margin-bottom:10px;position:relative}
.filho-rm{position:absolute;top:8px;right:10px;background:none;border:none;cursor:pointer;color:#ccc;font-size:20px;line-height:1}
.filho-rm:hover{color:var(--red)}
.add-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--navy);background:none;border:1.5px solid var(--navy);border-radius:7px;padding:7px 16px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:6px}
.add-btn:hover{background:var(--goldpale)}
.sub-btn{width:100%;height:50px;background:var(--navy);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:24px;transition:background .2s}
.sub-btn:hover{background:var(--navy2)}
.success{display:none;text-align:center;padding:48px 24px;background:#fff;border-radius:10px;border:1px solid var(--border)}
.success .ck{width:58px;height:58px;background:var(--goldpale);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px}
.success h3{font-size:20px;font-weight:600;color:var(--navy);margin-bottom:8px}
.success p{color:var(--muted);font-size:14px}
footer{background:var(--navy);padding:16px;text-align:center}
footer p{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.04em}
footer span{color:var(--gold)}
</style>
</head>
<body>
<div class="hd">
  <div class="hd-inner">
    <img src="LOGO_BASE64_AQUI" alt="Pró Eficácia">
    <div class="hd-right">
      <div class="sub">Departamento Pessoal</div>
      <div class="tit">Ficha Admissional</div>
    </div>
  </div>
</div>
